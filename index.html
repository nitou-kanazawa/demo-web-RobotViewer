<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>多関節ロボット シミュレータ</title>
<style>
  :root {
    --bg: #0e1116;
    --panel: rgba(20, 26, 34, 0.92);
    --accent: #f08a24;
    --text: #e6edf3;
    --muted: #8b98a5;
    --border: #2a3340;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
  }
  #scene { position: fixed; inset: 0; touch-action: none; }

  #title {
    position: fixed; top: 0; left: 0; right: 0;
    padding: calc(env(safe-area-inset-top) + 10px) 14px 10px;
    background: linear-gradient(180deg, rgba(14,17,22,0.85), rgba(14,17,22,0));
    font-size: 14px; font-weight: 600; letter-spacing: .02em;
    display: flex; align-items: center; gap: 8px; pointer-events: none;
  }
  #title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  #title small { color: var(--muted); font-weight: 400; }

  #panel {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--panel);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    backdrop-filter: blur(10px);
    padding: 8px 14px calc(env(safe-area-inset-bottom) + 12px);
    max-height: 56vh; overflow-y: auto;
    transition: transform .25s ease;
    box-shadow: 0 -8px 30px rgba(0,0,0,.4);
  }
  #panel.collapsed { transform: translateY(calc(100% - 46px)); }

  #panelHeader {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0 8px; cursor: pointer; user-select: none;
  }
  #panelHeader b { font-size: 13px; }
  #panelHeader .grip { width: 38px; height: 4px; border-radius: 2px; background: var(--border);
    position: absolute; left: 50%; transform: translateX(-50%); top: 6px; }
  #toggleBtn { color: var(--muted); font-size: 12px; }

  .row { margin: 10px 0; }
  .row .label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
  .row .label .name { color: var(--text); }
  .row .label .val { color: var(--accent); font-variant-numeric: tabular-nums; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 30px;
    background: transparent; margin: 0;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 6px; border-radius: 3px; background: #1c2530; border: 1px solid var(--border);
  }
  input[type=range]::-moz-range-track {
    height: 6px; border-radius: 3px; background: #1c2530; border: 1px solid var(--border);
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none; width: 26px; height: 26px; margin-top: -11px;
    border-radius: 50%; background: var(--accent); border: 2px solid #fff2;
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 26px; height: 26px; border-radius: 50%; background: var(--accent); border: 2px solid #fff2;
  }

  .btns { display: flex; gap: 8px; margin-top: 4px; }
  button.act {
    flex: 1; padding: 11px; border-radius: 10px; border: 1px solid var(--border);
    background: #18212c; color: var(--text); font-size: 13px; font-weight: 600;
  }
  button.act:active { background: #222d3a; }
  button.act.primary { background: var(--accent); color: #1a1206; border-color: transparent; }

  .tabs { display: flex; gap: 6px; margin: 2px 0 8px; }
  .tab {
    flex: 1; padding: 9px; border-radius: 9px; border: 1px solid var(--border);
    background: #141b24; color: var(--muted); font-size: 13px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .tab.active { background: #1e2935; color: var(--text); border-color: var(--accent); }
  .badge {
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px; background: var(--accent);
    color: #1a1206; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center;
  }
  .tabpane { display: none; }
  .tabpane.active { display: block; }

  .muted { color: var(--muted); font-size: 12px; line-height: 1.6; }
  .wplist { display: flex; flex-direction: column; gap: 6px; margin: 4px 0 10px; }
  .wp {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px;
    background: #141b24; border: 1px solid var(--border); border-radius: 10px;
  }
  .wp.current { border-color: var(--accent); background: #1c2733; }
  .wp .idx {
    width: 24px; height: 24px; flex: 0 0 auto; border-radius: 50%; background: #243040;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700;
  }
  .wp.current .idx { background: var(--accent); color: #1a1206; }
  .wp .deg { flex: 1; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .wp .mini { background: none; border: none; color: var(--muted); font-size: 16px; padding: 4px 6px; }
  .wp .mini.go { color: #5db1ff; }
  .wp .mini.del { color: #ff6b6b; }

  .ctrlrow { margin: 10px 0 4px; }
  .ctrllabel { font-size: 12px; color: var(--muted); display: block; margin-bottom: 2px; }
  .ctrllabel b { color: var(--accent); }
  .chkrow { display: flex; gap: 16px; margin: 6px 0 2px; }
  .chk { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
  .chk input { width: 18px; height: 18px; accent-color: var(--accent); }

  /* ===== PC（広い画面＋マウス）専用レイアウト ===== */
  #hint {
    display: none;
    position: fixed; left: 20px; bottom: 20px; z-index: 4;
    color: var(--muted); font-size: 12px; line-height: 1.8;
    background: rgba(20,26,34,.55); padding: 9px 13px; border-radius: 10px;
    border: 1px solid var(--border); pointer-events: none; backdrop-filter: blur(4px);
  }
  #hint b { color: var(--text); font-weight: 600; }

  @media (min-width: 860px) and (pointer: fine) {
    #title { background: none; font-size: 16px; padding: 18px 22px; }
    /* コントロールを右サイドの固定ドックに変身 */
    #panel {
      left: auto; right: 0; top: 0; bottom: 0;
      width: 360px; max-height: none; border-radius: 0;
      border-top: none; border-left: 1px solid var(--border);
      padding: 16px 18px 22px;
      box-shadow: -10px 0 34px rgba(0,0,0,.4);
      transform: none !important; /* 折りたたみ無効（常時表示） */
    }
    #panelHeader { padding: 4px 2px 12px; cursor: default; }
    #panelHeader .grip { display: none; }
    #panelHeader b { font-size: 16px; }
    #toggleBtn { display: none; }
    .tabs { position: sticky; top: 0; z-index: 3; background: var(--panel); padding-bottom: 10px; }
    .row { margin: 14px 0; }
    .wp { padding: 11px 12px; }
    #hint { display: block; } /* マウス操作ヒントを表示 */
  }

  #hitBanner {
    position: fixed; top: calc(env(safe-area-inset-top) + 44px); left: 50%; transform: translateX(-50%);
    background: rgba(220, 40, 50, 0.92); color: #fff; font-size: 13px; font-weight: 700;
    padding: 7px 16px; border-radius: 20px; display: none; z-index: 6;
    box-shadow: 0 4px 14px rgba(220,40,50,.4); animation: pulse 1s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .6; } }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 14px; background: var(--bg); z-index: 10; font-size: 14px; color: var(--muted);
  }
  .spin { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: r 1s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
  #err { color: #ff6b6b; font-size: 12px; max-width: 80%; text-align: center; line-height: 1.5; }
</style>
</head>
<body>
  <canvas id="scene"></canvas>

  <div id="title"><span class="dot"></span> 多関節ロボット シミュレータ <small>URDF / 6-DOF</small></div>

  <div id="loading">
    <div class="spin"></div>
    <div>ロボットを読み込み中…</div>
    <div id="err"></div>
  </div>

  <div id="panel" class="collapsed">
    <div id="panelHeader">
      <span class="grip"></span>
      <b>コントロール</b>
      <span id="toggleBtn">開く ▲</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="joints">関節</button>
      <button class="tab" data-tab="path">パス <span id="wpBadge" class="badge">0</span></button>
      <button class="tab" data-tab="env">環境</button>
      <button class="tab" data-tab="ik">IK</button>
    </div>

    <div id="tab-joints" class="tabpane active">
      <div id="sliders"></div>
      <div class="btns">
        <button class="act" id="homeBtn">ホーム姿勢</button>
        <button class="act" id="poseBtn">サンプル姿勢</button>
      </div>
      <div class="btns">
        <button class="act primary" id="addWpBtn">＋ この姿勢を経由点に追加</button>
      </div>
    </div>

    <div id="tab-path" class="tabpane">
      <div id="wpEmpty" class="muted">経由点がありません。<br>「関節」タブで姿勢を作り「＋ この姿勢を経由点に追加」を押してください。</div>
      <div id="wpList" class="wplist"></div>

      <div class="ctrlrow">
        <span class="ctrllabel">区間あたり <b id="durVal">1.5</b> 秒</span>
        <input type="range" id="durSlider" min="0.3" max="4" step="0.1" value="1.5">
      </div>
      <div class="chkrow">
        <label class="chk"><input type="checkbox" id="loopChk"> ループ</label>
        <label class="chk"><input type="checkbox" id="traceChk" checked> 軌跡</label>
      </div>

      <div class="btns">
        <button class="act" id="clearWpBtn">クリア</button>
        <button class="act primary" id="playBtn">▶ 再生</button>
      </div>
      <div id="playStatus" class="muted"></div>
    </div>

    <div id="tab-env" class="tabpane">
      <div class="chkrow" style="flex-direction:column; gap:10px; align-items:flex-start;">
        <label class="chk"><input type="checkbox" id="collideChk" checked> 当たり判定を有効</label>
        <label class="chk"><input type="checkbox" id="showObsChk" checked> 障害物を表示</label>
        <label class="chk"><input type="checkbox" id="stopOnHitChk" checked> 衝突したら再生を停止</label>
      </div>
      <div class="muted" style="margin-top:8px;">
        各リンクの境界ボックス（AABB）と障害物・床の交差で判定します。<br>
        衝突したリンクは<span style="color:#ff5a6e;">赤く発光</span>します。
      </div>
      <div class="btns">
        <button class="act" id="resetObsBtn">障害物を初期配置に戻す</button>
      </div>
    </div>

    <div id="tab-ik" class="tabpane">
      <label class="chk"><input type="checkbox" id="ikChk"> IKモード（先端をドラッグで移動）</label>
      <div class="muted" style="margin-top:8px;">
        表示される<span style="color:#5db1ff;">青い球（ギズモ）</span>を掴んで動かすと、<br>
        先端がそこへ届くよう各関節を自動計算します（CCD法・位置のみ）。
      </div>
      <div class="ctrlrow">
        <span class="ctrllabel">追従の強さ <b id="ikGainVal">0.5</b></span>
        <input type="range" id="ikGain" min="0.1" max="1" step="0.05" value="0.5">
      </div>
      <div class="btns">
        <button class="act" id="resetTargetBtn">ターゲットを先端に戻す</button>
      </div>
      <div id="ikStatus" class="muted"></div>
    </div>
  </div>

  <div id="hitBanner">⚠ 衝突を検知</div>

  <div id="hint"><b>ドラッグ</b> 回転 ／ <b>ホイール</b> ズーム ／ <b>右ドラッグ</b> 平行移動</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "three/examples/jsm/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
    "urdf-loader": "https://esm.sh/urdf-loader@0.13.0?external=three"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { TransformControls } from 'three/addons/controls/TransformControls.js';
import URDFLoader from 'urdf-loader';

// ---- サンプル6軸アームの URDF（プリミティブ形状なので外部メッシュ不要） ----
const URDF = `
<robot name="arm6">
  <material name="base"><color rgba="0.16 0.18 0.22 1"/></material>
  <material name="link"><color rgba="0.13 0.55 0.85 1"/></material>
  <material name="joint"><color rgba="0.94 0.54 0.14 1"/></material>
  <material name="ee"><color rgba="0.86 0.22 0.30 1"/></material>

  <link name="base_link">
    <visual><origin xyz="0 0 0.03"/><geometry><cylinder radius="0.10" length="0.06"/></geometry><material name="base"/></visual>
  </link>

  <joint name="joint1" type="revolute">
    <parent link="base_link"/><child link="link1"/>
    <origin xyz="0 0 0.06"/><axis xyz="0 0 1"/>
    <limit lower="-3.1416" upper="3.1416" effort="10" velocity="2"/>
  </joint>
  <link name="link1">
    <visual><origin xyz="0 0 0.05"/><geometry><cylinder radius="0.075" length="0.10"/></geometry><material name="joint"/></visual>
  </link>

  <joint name="joint2" type="revolute">
    <parent link="link1"/><child link="link2"/>
    <origin xyz="0 0 0.10"/><axis xyz="0 1 0"/>
    <limit lower="-1.85" upper="1.85" effort="10" velocity="2"/>
  </joint>
  <link name="link2">
    <visual><origin xyz="0 0 0.16"/><geometry><box size="0.075 0.075 0.32"/></geometry><material name="link"/></visual>
  </link>

  <joint name="joint3" type="revolute">
    <parent link="link2"/><child link="link3"/>
    <origin xyz="0 0 0.32"/><axis xyz="0 1 0"/>
    <limit lower="-2.6" upper="2.6" effort="10" velocity="2"/>
  </joint>
  <link name="link3">
    <visual><origin xyz="0 0 0.13"/><geometry><box size="0.062 0.062 0.26"/></geometry><material name="link"/></visual>
  </link>

  <joint name="joint4" type="revolute">
    <parent link="link3"/><child link="link4"/>
    <origin xyz="0 0 0.26"/><axis xyz="0 0 1"/>
    <limit lower="-3.1416" upper="3.1416" effort="10" velocity="2"/>
  </joint>
  <link name="link4">
    <visual><origin xyz="0 0 0.05"/><geometry><cylinder radius="0.052" length="0.10"/></geometry><material name="joint"/></visual>
  </link>

  <joint name="joint5" type="revolute">
    <parent link="link4"/><child link="link5"/>
    <origin xyz="0 0 0.10"/><axis xyz="0 1 0"/>
    <limit lower="-1.95" upper="1.95" effort="10" velocity="2"/>
  </joint>
  <link name="link5">
    <visual><origin xyz="0 0 0.045"/><geometry><box size="0.052 0.052 0.09"/></geometry><material name="joint"/></visual>
  </link>

  <joint name="joint6" type="revolute">
    <parent link="link5"/><child link="link6"/>
    <origin xyz="0 0 0.09"/><axis xyz="0 0 1"/>
    <limit lower="-3.1416" upper="3.1416" effort="10" velocity="2"/>
  </joint>
  <link name="link6">
    <visual><origin xyz="0 0 0.03"/><geometry><box size="0.11 0.045 0.06"/></geometry><material name="ee"/></visual>
  </link>
</robot>`;

const SAMPLE_POSE = { joint1: 0.6, joint2: -0.7, joint3: 1.2, joint4: 0.0, joint5: 0.9, joint6: 0.0 };

// ---- three.js セットアップ ----
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0e1116);

const camera = new THREE.PerspectiveCamera(50, 1, 0.01, 100);
camera.position.set(1.0, 0.9, 1.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.target.set(0, 0.45, 0);
controls.minDistance = 0.4;
controls.maxDistance = 5;
controls.maxPolarAngle = Math.PI * 0.52;

// ライト
scene.add(new THREE.HemisphereLight(0xbfd4ff, 0x1a1f26, 0.7));
const key = new THREE.DirectionalLight(0xffffff, 2.0);
key.position.set(1.5, 3, 2);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.near = 0.5; key.shadow.camera.far = 12;
key.shadow.camera.left = -2; key.shadow.camera.right = 2;
key.shadow.camera.top = 2; key.shadow.camera.bottom = -2;
key.shadow.bias = -0.0005;
scene.add(key);
scene.add(new THREE.DirectionalLight(0x88aaff, 0.4).translateX(-2).translateZ(-1));

// 環境（床グリッド）— Phase 3 の当たり判定で障害物を足していく土台
const ground = new THREE.Mesh(
  new THREE.CircleGeometry(3, 64),
  new THREE.MeshStandardMaterial({ color: 0x121821, roughness: 1, metalness: 0 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
const grid = new THREE.GridHelper(4, 20, 0x2a3340, 0x1b2330);
grid.position.y = 0.001;
scene.add(grid);

// ---- URDF 読み込み ----
let robot = null;
const linkMeshes = []; // 当たり判定対象（各リンクの可視メッシュ）
const slidersEl = document.getElementById('sliders');

function setVal(name, v) {
  robot.setJointValue(name, v);
}

const loader = new URDFLoader();
loader.parseCollision = false;
try {
  robot = loader.parse(URDF);

  // URDF は Z-up。three.js は Y-up なので X 軸まわりに -90°回して立たせる。
  robot.rotation.x = -Math.PI / 2;
  robot.traverse((c) => {
    if (c.isMesh) {
      c.castShadow = true; c.receiveShadow = true;
      // 個別にハイライトできるようマテリアルを複製し、元の発光色を控える
      c.material = c.material.clone();
      c.userData.baseEmissive = c.material.emissive ? c.material.emissive.getHex() : 0x000000;
      linkMeshes.push(c);
    }
  });
  scene.add(robot);

  buildSliders();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('panel').classList.remove('collapsed');
} catch (e) {
  document.getElementById('err').textContent = '読み込み失敗: ' + e.message;
  console.error(e);
}

// ---- 関節スライダー UI ----
function buildSliders() {
  slidersEl.innerHTML = '';
  Object.values(robot.joints).forEach((joint) => {
    if (joint.jointType === 'fixed') return;
    const name = joint.name;
    const lo = joint.limit.lower, hi = joint.limit.upper;

    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <div class="label"><span class="name">${name}</span><span class="val" id="v_${name}">0°</span></div>
      <input type="range" min="${lo}" max="${hi}" step="0.01" value="0" id="s_${name}">`;
    slidersEl.appendChild(row);

    const slider = row.querySelector('input');
    const valEl = row.querySelector('.val');
    slider.addEventListener('input', () => {
      const v = parseFloat(slider.value);
      setVal(name, v);
      valEl.textContent = Math.round(v * 180 / Math.PI) + '°';
    });
  });
}

// 可動関節（fixed以外）の一覧
function movableJoints() {
  return Object.values(robot.joints).filter((j) => j.jointType !== 'fixed');
}
// 現在の姿勢を {関節名: 角度} で読み取る
function readPose() {
  const p = {};
  movableJoints().forEach((j) => { p[j.name] = j.angle; });
  return p;
}
// スライダー/数値表示を姿勢に同期
function updateSliderUI(pose) {
  movableJoints().forEach((j) => {
    const v = pose[j.name] ?? 0;
    const slider = document.getElementById('s_' + j.name);
    const valEl = document.getElementById('v_' + j.name);
    if (slider) slider.value = v;
    if (valEl) valEl.textContent = Math.round(v * 180 / Math.PI) + '°';
  });
}
// ロボットへ姿勢を適用しUIも更新
function applyPose(pose) {
  movableJoints().forEach((j) => setVal(j.name, pose[j.name] ?? 0));
  updateSliderUI(pose);
}

document.getElementById('homeBtn').addEventListener('click', () => { stopPlay(); applyPose({}); });
document.getElementById('poseBtn').addEventListener('click', () => { stopPlay(); applyPose(SAMPLE_POSE); });

// ---- タブ切り替え ----
document.querySelectorAll('.tab').forEach((tab) => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach((t) => t.classList.remove('active'));
    document.querySelectorAll('.tabpane').forEach((p) => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

// ---- 経由点（ウェイポイント）管理 ----
const waypoints = [];
const wpListEl = document.getElementById('wpList');
const wpEmptyEl = document.getElementById('wpEmpty');
const wpBadge = document.getElementById('wpBadge');

function poseToDeg(pose) {
  return movableJoints().map((j) => Math.round((pose[j.name] ?? 0) * 180 / Math.PI) + '°').join(' / ');
}
function renderWaypoints() {
  wpBadge.textContent = waypoints.length;
  wpEmptyEl.style.display = waypoints.length ? 'none' : 'block';
  wpListEl.innerHTML = '';
  waypoints.forEach((wp, i) => {
    const row = document.createElement('div');
    row.className = 'wp' + (player.playing && i === player.activeSeg ? ' current' : '');
    row.innerHTML = `
      <span class="idx">${i + 1}</span>
      <span class="deg">${poseToDeg(wp)}</span>
      <button class="mini go" title="この姿勢へ">⤓</button>
      <button class="mini del" title="削除">✕</button>`;
    row.querySelector('.go').addEventListener('click', () => { stopPlay(); applyPose(wp); });
    row.querySelector('.del').addEventListener('click', () => { stopPlay(); waypoints.splice(i, 1); renderWaypoints(); });
    wpListEl.appendChild(row);
  });
}
document.getElementById('addWpBtn').addEventListener('click', () => {
  waypoints.push(readPose());
  renderWaypoints();
  document.querySelector('.tab[data-tab="path"]').click(); // パスタブへ誘導
});
document.getElementById('clearWpBtn').addEventListener('click', () => { stopPlay(); waypoints.length = 0; clearTrace(); renderWaypoints(); });

// ---- 区間あたりの秒数 ----
const durSlider = document.getElementById('durSlider');
const durVal = document.getElementById('durVal');
durSlider.addEventListener('input', () => { durVal.textContent = parseFloat(durSlider.value).toFixed(1); });

// ---- 手先（エンドエフェクタ）の軌跡トレース ----
const traceChk = document.getElementById('traceChk');
const eeLink = robot.links['link6'];
let tracePts = [];
const traceGeom = new THREE.BufferGeometry();
const traceLine = new THREE.Line(traceGeom, new THREE.LineBasicMaterial({ color: 0xff5a6e }));
traceLine.frustumCulled = false;
scene.add(traceLine);
const _wp = new THREE.Vector3();
function clearTrace() { tracePts = []; traceGeom.setFromPoints([]); }
function pushTrace() {
  if (!traceChk.checked || !eeLink) return;
  robot.updateMatrixWorld(true);
  eeLink.getWorldPosition(_wp);
  tracePts.push(_wp.clone());
  if (tracePts.length > 1500) tracePts.shift();
  traceGeom.setFromPoints(tracePts);
}
traceChk.addEventListener('change', () => { if (!traceChk.checked) clearTrace(); });

// ---- 再生エンジン（経由点を線形補間 + smoothstep でなめらかに） ----
const player = { playing: false, time: 0, activeSeg: -1 };
const playBtn = document.getElementById('playBtn');
const loopChk = document.getElementById('loopChk');
const playStatus = document.getElementById('playStatus');
const clock = new THREE.Clock();
const smooth = (t) => t * t * (3 - 2 * t);

function startPlay() {
  if (waypoints.length < 2) { playStatus.textContent = '経由点が2つ以上必要です。'; return; }
  player.playing = true;
  player.time = 0;
  player.activeSeg = -1;
  clearTrace();
  playBtn.textContent = '⏸ 一時停止';
}
function stopPlay() {
  if (!player.playing) return;
  player.playing = false;
  playBtn.textContent = '▶ 再生';
  renderWaypoints();
}
playBtn.addEventListener('click', () => { player.playing ? stopPlay() : startPlay(); });

function updatePlayback(dt) {
  if (!player.playing) return;
  const seg = parseFloat(durSlider.value);
  const segCount = waypoints.length - 1;
  const total = segCount * seg;
  player.time += dt;
  let finished = false;
  if (player.time >= total) {
    if (loopChk.checked) { player.time = player.time % total; }
    else { player.time = total; finished = true; }
  }
  const si = Math.min(Math.floor(player.time / seg), segCount - 1);
  const local = smooth((player.time - si * seg) / seg);
  const a = waypoints[si], b = waypoints[si + 1];
  const pose = {};
  movableJoints().forEach((j) => {
    const av = a[j.name] ?? 0, bv = b[j.name] ?? 0;
    pose[j.name] = av + (bv - av) * local;
  });
  applyPose(pose);
  pushTrace();
  if (player.activeSeg !== si) { player.activeSeg = si; renderWaypoints(); }
  playStatus.textContent = `再生中  区間 ${si + 1} / ${segCount}`;
  if (finished) { stopPlay(); playStatus.textContent = '完了'; }
}

// ---- 環境（障害物） ----
const obstacles = [];
const OBS_MAT = () => new THREE.MeshStandardMaterial({ color: 0x6b7585, roughness: 0.85, metalness: 0.1, transparent: true, opacity: 0.9 });
function addBoxObstacle(x, y, z, sx, sy, sz) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(sx, sy, sz), OBS_MAT());
  m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true;
  scene.add(m);
  obstacles.push(m);
  return m;
}
function resetObstacles() {
  obstacles.forEach((o) => scene.remove(o));
  obstacles.length = 0;
  addBoxObstacle(0.46, 0.22, 0.0, 0.16, 0.44, 0.42); // 縦長の壁
  addBoxObstacle(-0.30, 0.13, 0.34, 0.26, 0.26, 0.26); // 箱
}
resetObstacles();

// ---- 当たり判定（各リンクのAABB × 障害物/床） ----
const collideChk = document.getElementById('collideChk');
const showObsChk = document.getElementById('showObsChk');
const stopOnHitChk = document.getElementById('stopOnHitChk');
const hitBanner = document.getElementById('hitBanner');
const _lbox = new THREE.Box3();

function setHighlight(mesh, on) {
  if (!mesh.material.emissive) return;
  if (on) { mesh.material.emissive.setHex(0xff2a2a); mesh.material.emissiveIntensity = 1; }
  else { mesh.material.emissive.setHex(mesh.userData.baseEmissive); }
}
function clearHighlights() { linkMeshes.forEach((m) => setHighlight(m, false)); }

showObsChk.addEventListener('change', () => {
  obstacles.forEach((o) => { o.visible = showObsChk.checked; });
});
document.getElementById('resetObsBtn').addEventListener('click', () => {
  resetObstacles();
  obstacles.forEach((o) => { o.visible = showObsChk.checked; });
});

function checkCollisions() {
  if (!collideChk.checked) { clearHighlights(); hitBanner.style.display = 'none'; return; }
  robot.updateMatrixWorld(true);
  const obsBoxes = obstacles.filter((o) => o.visible).map((o) => new THREE.Box3().setFromObject(o));
  let anyHit = false;
  for (const mesh of linkMeshes) {
    _lbox.setFromObject(mesh);
    let hit = _lbox.min.y < -0.005; // 床（y=0）にめり込み
    if (!hit) {
      for (const ob of obsBoxes) { if (_lbox.intersectsBox(ob)) { hit = true; break; } }
    }
    setHighlight(mesh, hit);
    if (hit) anyHit = true;
  }
  hitBanner.style.display = anyHit ? 'block' : 'none';
  if (anyHit && player.playing && stopOnHitChk.checked) {
    stopPlay();
    playStatus.textContent = '⚠ 衝突を検知して停止しました';
  }
}

// ---- IK（CCD法・位置のみ） ----
const ikChk = document.getElementById('ikChk');
const ikGain = document.getElementById('ikGain');
const ikGainVal = document.getElementById('ikGainVal');
const ikStatus = document.getElementById('ikStatus');
let ikActive = false;

// 先端(eeLink)から根元へ辿って関節チェーンを作る（tip→base順）
const ikChain = [];
for (let o = eeLink; o && o !== robot; o = o.parent) {
  if (o.isURDFJoint && o.jointType !== 'fixed') ikChain.push(o);
}

// ドラッグ可能なターゲット（青い球）+ ギズモ
const target = new THREE.Mesh(
  new THREE.SphereGeometry(0.035, 24, 16),
  new THREE.MeshBasicMaterial({ color: 0x5db1ff, transparent: true, opacity: 0.85 })
);
target.visible = false;
scene.add(target);

const tcontrols = new TransformControls(camera, renderer.domElement);
tcontrols.setSize(0.9);
tcontrols.addEventListener('dragging-changed', (e) => { controls.enabled = !e.value; });
tcontrols.addEventListener('objectChange', () => { if (ikActive) solveIK(); });
scene.add(tcontrols);

const _ep = new THREE.Vector3(), _jp = new THREE.Vector3(), _q = new THREE.Quaternion();
const _axis = new THREE.Vector3(), _toEnd = new THREE.Vector3(), _toTarget = new THREE.Vector3(), _cross = new THREE.Vector3();

function solveIK() {
  const gain = parseFloat(ikGain.value);
  const tp = target.position;
  for (let iter = 0; iter < 12; iter++) {
    robot.updateMatrixWorld(true);
    eeLink.getWorldPosition(_ep);
    if (_ep.distanceTo(tp) < 0.004) break;
    for (const joint of ikChain) {
      joint.getWorldPosition(_jp);
      joint.getWorldQuaternion(_q);
      _axis.copy(joint.axis).applyQuaternion(_q).normalize();
      eeLink.getWorldPosition(_ep);
      _toEnd.subVectors(_ep, _jp);
      _toTarget.subVectors(tp, _jp);
      // 関節軸に垂直な平面へ射影してから角度を求める
      _toEnd.addScaledVector(_axis, -_toEnd.dot(_axis));
      _toTarget.addScaledVector(_axis, -_toTarget.dot(_axis));
      if (_toEnd.lengthSq() < 1e-8 || _toTarget.lengthSq() < 1e-8) continue;
      _toEnd.normalize(); _toTarget.normalize();
      let ang = Math.acos(THREE.MathUtils.clamp(_toEnd.dot(_toTarget), -1, 1));
      if (ang < 1e-5) continue;
      _cross.crossVectors(_toEnd, _toTarget);
      if (_cross.dot(_axis) < 0) ang = -ang;
      ang *= gain;
      const nv = THREE.MathUtils.clamp(joint.angle + ang, joint.limit.lower, joint.limit.upper);
      joint.setJointValue(nv);
      robot.updateMatrixWorld(true);
    }
  }
  updateSliderUI(readPose());
  eeLink.getWorldPosition(_ep);
  const err = _ep.distanceTo(tp);
  ikStatus.textContent = err < 0.02 ? '到達 ✓' : `誤差 ${(err * 1000).toFixed(0)} mm（可動範囲外かも）`;
}

function setIKMode(on) {
  ikActive = on;
  target.visible = on;
  if (on) {
    stopPlay();
    robot.updateMatrixWorld(true);
    eeLink.getWorldPosition(target.position);
    tcontrols.attach(target);
    ikStatus.textContent = '青い球を掴んで動かしてください';
  } else {
    tcontrols.detach();
    ikStatus.textContent = '';
  }
}
ikChk.addEventListener('change', () => setIKMode(ikChk.checked));
ikGain.addEventListener('input', () => { ikGainVal.textContent = parseFloat(ikGain.value).toFixed(2); });
document.getElementById('resetTargetBtn').addEventListener('click', () => {
  robot.updateMatrixWorld(true);
  eeLink.getWorldPosition(target.position);
  if (ikActive) ikStatus.textContent = 'ターゲットを先端に戻しました';
});

// ---- PC / モバイル判定 ----
const DESKTOP_MQ = window.matchMedia('(min-width: 860px) and (pointer: fine)');
const DOCK_W = 360; // PC時の右ドック幅（CSSと一致させる）

// ---- パネル開閉（モバイルのみ） ----
const panel = document.getElementById('panel');
document.getElementById('panelHeader').addEventListener('click', () => {
  if (DESKTOP_MQ.matches) return; // PCでは常時表示
  const collapsed = panel.classList.toggle('collapsed');
  document.getElementById('toggleBtn').textContent = collapsed ? '開く ▲' : '閉じる ▼';
});

// ---- リサイズ & 描画ループ ----
function resize() {
  const w = innerWidth, h = innerHeight;
  renderer.setSize(w, h, false);
  // PC時は右ドック分を見越して、ロボットを左の空き領域の中央に寄せる
  const pad = DESKTOP_MQ.matches ? DOCK_W : 0;
  camera.aspect = (w + pad) / h;
  if (pad) camera.setViewOffset(w + pad, h, pad, 0, w, h);
  else camera.clearViewOffset();
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
DESKTOP_MQ.addEventListener('change', resize);
resize();

renderer.setAnimationLoop(() => {
  const dt = Math.min(clock.getDelta(), 0.1);
  if (robot) { updatePlayback(dt); checkCollisions(); }
  controls.update();
  renderer.render(scene, camera);
});
</script>
</body>
</html>
